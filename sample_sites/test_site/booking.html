<!DOCTYPE html>
<!-- INTENTIONAL A11Y BUG: no lang attribute on <html>. -->
<html>
<head>
    <meta charset="UTF-8">
    <title>Plumbing Services Tel-Aviv | Book a Visit</title>
    <meta name="description" content="Book a plumber visit online. Quick form, fast response.">
    <!-- INTENTIONAL A11Y BUG: no viewport meta tag. -->
</head>
<body>
    <header>
        <h1>Book a Visit</h1>
        <nav>
            <a href="/index.html">Home</a> |
            <a href="/services.html">Services</a> |
            <!-- INTENTIONAL A11Y BUG: generic link text. -->
            <a href="/pricing.html">click here</a>
        </nav>
    </header>

    <main>
        <p>Fill out the form and we will get back to you within 24 hours.</p>

        <form>
            <!-- INTENTIONAL A11Y BUG x3: inputs with no labels. -->
            <p><input type="text" name="name" placeholder="Your name"></p>
            <p><input type="email" name="email" placeholder="Email"></p>
            <p><input type="tel" name="phone" placeholder="Phone"></p>

            <!-- This one is fine — it has a proper label. -->
            <p>
                <label for="message">Describe the problem:</label>
                <textarea id="message" name="message" rows="4"></textarea>
            </p>

            <!-- INTENTIONAL A11Y BUG: button with no accessible text. -->
            <button type="submit"></button>
        </form>

        <h2>What happens next?</h2>
        <!-- INTENTIONAL A11Y BUG: heading level jumps H2 -> H4. -->
        <h4>We confirm the appointment</h4>
        <p>You will receive a confirmation by email and SMS.</p>

        <!-- INTENTIONAL A11Y BUG: very low contrast inline style. -->
        <p style="color: #ccc;">By submitting, you accept our terms of service.</p>
    </main>
</body>
</html>
